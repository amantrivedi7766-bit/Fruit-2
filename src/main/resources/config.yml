# FruitsPlugin Configuration

# Grace Period Settings
grace_period:
  enabled: true
  duration: 60
  bossbar_title: "&c⚠️ GRACE PERIOD &7| &e{time}s &7remaining"
  message: "&c⚠️ &lGRACE PERIOD ACTIVE! &cDon't die or you'll lose your fruit!"

# Death Settings
death:
  lose_power: true

# Messages
messages:
  prefix: "&8[&6⚡&8]&r "
  fruit_eaten: "&a✅ You ate &6{fruit}&a! &7Abilities are now active!"
  ability_used: "&a⚡ Used &6{ability}&a! ({used}/3)"
  fruit_returned: "&a🔄 Fruit returned to inventory! Eat again to reuse!"
  no_fruit: "&c❌ You haven't eaten any fruit!"
  power_lost: "&c💀 &lYou died and lost your fruit powers!"
  power_kept: "&a✨ You kept your fruit powers after death!"
  grace_start: "&c⚠️ &lGRACE PERIOD STARTED! &cYou have {time}s to prepare!"
  grace_end: "&a✅ &lGRACE PERIOD ENDED! &aYour fruit is now safe!"
