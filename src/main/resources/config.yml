# 🍎 FruitsPlugin Configuration
# Version: 1.0.0

# Cooldown settings (seconds)
cooldown:
  default: 15
  one_shot: 120
  gods_wrath: 60
  divine_shield: 90
  vine_grab: 20
  lunar_slip: 15

# XP requirements
xp_requirements:
  one_shot: 30

# Messages
messages:
  prefix: "&8[&6Fruits&8] "
  no_fruit: "&c❌ You haven't eaten any fruit!"
  on_cooldown: "&c⏳ Cooldown: &e{seconds}s"
  fruit_eaten: "&a✅ You ate &6{fruit}&a! Use &e/fruit use <1|2|3>"
  ability_used: "&a⚡ Used &6{ability}&a! (&e{used}&7/&e3&a)"
  fruit_returned: "&a🔄 Fruit returned to inventory!"
  one_shot_no_levels: "&c❌ Need {levels} XP levels!"
  one_shot_no_diamond: "&c❌ Target not wearing diamond armor!"
  invalid_ability: "&c❌ Use 1, 2, or 3"
  no_permission: "&c❌ No permission!"

# Sounds
sounds:
  eat: "ENTITY_PLAYER_BURP"
  ability_use: "ENTITY_PLAYER_LEVELUP"
  cooldown_finish: "ENTITY_EXPERIENCE_ORB_PICKUP"
  one_shot: "ENTITY_LIGHTNING_BOLT_IMPACT"

# Particles
particles:
  enabled: true
  ability_use: "FIREWORKS_SPARK"
  one_shot: "EXPLOSION"
