# Fruit Plugin Configuration

# ========== AUTO-GIVE SETTINGS ==========
# Give fruit to players every time they join
auto-give:
  enabled: false
  fruit-id: "nature_dye"
  amount: 1

# ========== FIRST JOIN GIFT SETTINGS ==========
# Give fruit to players only on their first join
join-fruit:
  enabled: true
  id: "nature_dye"
  amount: 1

# ========== SPIN WHEEL SETTINGS ==========
spin-wheel:
  enabled: true
  max-spins: 10
  cooldown: 60
  animation-duration: 15

# ========== STEAL SETTINGS ==========
steal:
  enabled: true
  cooldown: 60
  max-steal-per-attempt: 3

# ========== GENERAL SETTINGS ==========
settings:
  debug: false
  language: "en"
  prefix: "§6[Fruits] §7"
