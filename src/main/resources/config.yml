# FruitsPlugin Configuration

# Grace Period Settings
grace_period:
  enabled: true
  duration: 60
  bossbar_title: "&c⚠️ GRACE PERIOD &7| &e{time}s &7remaining"
  start_message: "&c⚠️ &lGRACE PERIOD STARTED! &cPVP is disabled for {time} seconds!"
  end_message: "&a✅ &lGRACE PERIOD ENDED! &aPVP is now enabled! &cFight wisely!"

# Death Settings
death:
  lose_power: true

# Cooldown Settings
cooldowns:
  default: 15
  meteor_storm: 30
  magma_shield: 45
  wind_monster: 60
  storm_monster: 60
  time_freeze: 50
  magnetic_pull: 35

# Messages
messages:
  prefix: "&8[&6⚡&8]&r "
  fruit_eaten: "&a✅ You ate &6{fruit}&a! &7Abilities are now active!"
  ability_used: "&a⚡ Used &6{ability}&a! ({used}/3)"
  fruit_returned: "&a🔄 Fruit returned to inventory! Eat again to reuse!"
  no_fruit: "&c❌ You haven't eaten any fruit!"
  grace_start: "&c⚠️ &lGRACE PERIOD STARTED! &cPVP disabled for {time}s!"
  grace_end: "&a✅ &lGRACE PERIOD ENDED! &aPVP enabled now!"
