name: FruitsPlugin
version: 1.0.0
main: com.example.fruits.FruitsPlugin
api-version: "1.21"

commands:
  fruit:
    description: Use fruit abilities or withdraw power
    usage: /fruit <use|withdraw> [1|2|3]
  fruitadmin:
    description: Admin commands for fruits
    usage: /fruitadmin <give|spin|spinall|gui|reload>
  graceperiod:
    description: Start or stop grace period
    usage: /graceperiod <start|stop> [minutes]

permissions:
  fruits.admin:
    default: op
